<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="115" fill="#0d0f14"/>
  <rect width="512" height="512" rx="115" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2035;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0f14;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Coin circle -->
  <circle cx="256" cy="220" r="120" fill="none" stroke="#4f8ef7" stroke-width="18" opacity="0.15"/>
  <circle cx="256" cy="220" r="94" fill="#1c2030"/>
  <!-- R$ symbol -->
  <text x="256" y="257" font-family="Georgia,serif" font-size="88" font-weight="bold" fill="#4f8ef7" text-anchor="middle">R$</text>
  <!-- Chart bars at bottom -->
  <rect x="96" y="390" width="44" height="60" rx="8" fill="#4f8ef7" opacity="0.4"/>
  <rect x="156" y="360" width="44" height="90" rx="8" fill="#4f8ef7" opacity="0.6"/>
  <rect x="216" y="330" width="44" height="120" rx="8" fill="#4f8ef7" opacity="0.8"/>
  <rect x="276" y="350" width="44" height="100" rx="8" fill="#34d87e" opacity="0.7"/>
  <rect x="336" y="310" width="44" height="140" rx="8" fill="#34d87e"/>
  <!-- Upward arrow trend -->
  <polyline points="96,390 156,360 216,330 276,350 336,310" stroke="#34d87e" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>